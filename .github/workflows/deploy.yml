name: Deploy to Cloudflare Pages

# Direct-upload deploy (house pattern, same as cerebral-work): CI composes the
# site and pushes it to the CF Pages project `unsigned-gg` on the Cerebral
# account. Custom domains unsigned.gg + www.unsigned.gg (cut over from GitHub
# Pages 2026-07-07). Requires repo secret CLOUDFLARE_API_TOKEN — the
# "unsigned-gg-pages-deploy (CI)" token, Pages:Edit scope only.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Compose site (static surfaces + built apps)
        run: bash scripts/build-site.sh _site
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 07ae57cca8fc1a438f9c9b875d1e2283
          command: pages deploy _site --project-name unsigned-gg --branch main
