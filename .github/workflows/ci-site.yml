name: CI — Site compose

# PR gate: the composed Pages artifact must build and carry the required
# surfaces. Catches app build breakage before main.
on:
  pull_request:

permissions:
  contents: read

jobs:
  compose:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Tokens dist matches source
        run: |
          (cd packages/tokens && bun run build)
          git diff --exit-code packages/tokens/dist
      - name: Palette dist matches source
        # ls-files first: `git diff` is vacuous for UNTRACKED files, and a
        # global gitignore `dist/` once kept the palette dist out of the repo
        # entirely — CI passed while the deploy compose had nothing to copy.
        run: |
          git ls-files --error-unmatch packages/palette/dist/palette.js packages/palette/dist/palette.mjs
          (cd packages/palette && bun run build)
          git diff --exit-code packages/palette/dist
      - name: Compose site
        run: bash scripts/build-site.sh _site
      - name: Assert required surfaces
        run: |
          test -f _site/index.html
          test -f _site/learn/index.html
          test -f _site/roadmap/index.html
          test -f _site/roadmap/data/roadmap.json
          test -f _site/onboard/index.html
          test -f _site/404.html
          test -f _site/tokens.css
          test -f _site/palette.js
          test -f _site/favicon.svg
          test -f _site/unsigned-logo.svg
          test -f _site/og-card.png
          test -f _site/robots.txt
          test -f _site/.well-known/security.txt
      - name: Data-honesty gate — no internal identifiers in the artifact
        # The site is public. Fail the compose on actual leak signatures:
        # tailnet MagicDNS names (*.ts.net) and real CGNAT host addresses
        # (canon: .impeccable.md "Data honesty"). The words tailnet/bastion and
        # the documented CIDR base 100.64.0.0 are teaching copy, not leaks —
        # deliberately not matched.
        run: |
          ! { grep -rInE '\.ts\.net' _site | grep -vF '<tailnet>.ts.net'; } || {
            echo '::error::tailnet MagicDNS name found in composed artifact'; exit 1; }
          ! grep -rInE '100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\.[0-9]+\.[0-9]+' _site | grep -vF '100.64.0.0' || {
            echo '::error::CGNAT address found in composed artifact'; exit 1; }
      - name: Roadmap data guard — schema + sanitized-projection leak guard
        # /roadmap is a curated, sanitized projection of the internal platform
        # roadmap. This guard validates the data schema and fails on internal
        # identifiers (ticket IDs, codenames, usernames, op://, etc.) beyond the
        # site-wide *.ts.net/CGNAT check above. See roadmap/check.sh.
        run: bash roadmap/check.sh roadmap/data/roadmap.json
