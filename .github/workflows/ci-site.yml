name: CI — Site compose

# PR gate: the composed Pages artifact must build and carry the required
# surfaces. Catches app build breakage and CNAME loss before main.
on:
  pull_request:

permissions:
  contents: read

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Compose site
        run: bash scripts/build-site.sh _site
      - name: Assert required surfaces
        run: |
          test -f _site/index.html
          test -f _site/CNAME
          test -f _site/learn/index.html
          grep -qx 'unsigned.gg' _site/CNAME
