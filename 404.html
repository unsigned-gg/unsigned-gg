<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>unsigned — not found</title>
  <script>
    // GitHub Pages serves this for every unknown path. SPA routes under
    // /onboard/ bounce to the app shell with the real path in ?p=, restored
    // by apps/onboard/src/main.tsx before the router mounts. Everything
    // else renders the 404 below.
    (function () {
      var l = window.location;
      if (l.pathname.indexOf("/onboard/") === 0) {
        var p = l.pathname.slice("/onboard".length) + l.search + l.hash;
        l.replace(l.origin + "/onboard/?p=" + encodeURIComponent(p));
      }
    })();
  </script>
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #0a0a0a; color: #8a8f98;
      font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 14px;
    }
    a { color: #00e599; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <p>404 — nothing at this path. <a href="/">unsigned.gg</a></p>
</body>
</html>
