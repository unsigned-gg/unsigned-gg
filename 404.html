<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>unsigned — not found</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <!-- meta cannot read CSS custom properties; value mirrors tokens.json color.bg -->
  <meta name="theme-color" content="#0a0a0a">
  <script>
    // The static host (Cloudflare Pages) serves this for every unknown
    // path. SPA routes under /onboard/ bounce to the app shell with the
    // real path in ?p=, restored by apps/onboard/src/main.tsx before the
    // router mounts. Everything else renders the 404 below.
    (function () {
      var l = window.location;
      if (l.pathname.indexOf("/onboard/") === 0) {
        var p = l.pathname.slice("/onboard".length) + l.search + l.hash;
        l.replace(l.origin + "/onboard/?p=" + encodeURIComponent(p));
      }
    })();
  </script>
  <link rel="stylesheet" href="/tokens.css">
  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: var(--bg); color: var(--dim);
      font-family: var(--mono); font-size: var(--text-body);
    }
    a { color: var(--green); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <p>404 — nothing at this path. <a href="/">unsigned.gg</a></p>
  <script src="/palette.js"></script>
  <script>
    // ⌘K on every page — even this one (canon).
    window.UnsignedPalette.init({
      getItems: function (q) {
        var items = [
          { hex: '0x00', label: 'unsigned.gg — home', k2: '', run: function () { location.href = '/'; } },
          { hex: '0x06', label: 'Learn — interactive explainers', k2: '', run: function () { location.href = '/learn/'; } },
          { hex: 'cmd', label: '/onboard — internal · sso', k2: '', run: function () { location.href = '/onboard/'; } },
        ];
        var needle = q.trim().toLowerCase();
        return needle ? items.filter(function (a) {
          return (a.hex + ' ' + a.label).toLowerCase().indexOf(needle) !== -1;
        }) : items;
      },
      emptyText: 'still nothing at that address.',
    });
  </script>
</body>
</html>
